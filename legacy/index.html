<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRUTAL CONVERTER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Space Mono', monospace;
            box-sizing: border-box;
        }

        :root {
            --black: #000000;
            --white: #ffffff;
            --border-thickness: 5px;
        }

        [data-theme="dark"] {
            --black: #ffffff;
            --white: #121212;
        }

        body {
            background: var(--white);
            color: var(--black);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            transition: background 0.1s ease-in-out;
            overflow-y: scroll;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        .converter-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0;
            border: var(--border-thickness) solid var(--black);
        }

        @media (min-width: 768px) {
            .converter-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .unit-box {
            border: var(--border-thickness) solid var(--black);
            border-top: none;
            border-left: none;
            padding: 20px 15px;
            cursor: pointer;
            transition: none;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .unit-box {
                padding: 30px 20px;
            }
        }

        .unit-box:hover,
        .unit-box:focus-within,
        .unit-box:hover input,
        .unit-box:focus-within input {
            background: var(--black) !important;
            color: var(--white) !important;
        }

        .unit-box:focus-within .unit-label,
        .unit-box:focus-within .copy-btn {
            color: var(--white) !important;
        }

        .unit-box:focus-within .copy-btn svg {
            stroke: var(--white);
        }

        .unit-box:hover .unit-label,
        .unit-box:hover .copy-btn {
            color: var(--white) !important;
        }

        .unit-box:hover .copy-btn svg {
            stroke: var(--white);
        }

        .unit-label {
            font-weight: 700;
            font-size: 16px;
            /* Increased */
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
            color: var(--black);
            pointer-events: none;
        }

        .unit-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            color: var(--black);
            padding: 5px 0;
            transition: none;
            cursor: text;
        }

        .unit-input::placeholder {
            color: #999;
        }

        .section-header {
            background: var(--black);
            color: var(--white);
            padding: 15px 20px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
            border: var(--border-thickness) solid var(--black);
            margin-bottom: -1px;
        }

        .converter-section {
            margin-bottom: 40px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .main-title {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 10px;
            line-height: 0.9;
        }

        .subtitle {
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: var(--border-thickness) solid var(--black);
        }

        .tab-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0;
            margin-bottom: 30px;
            border: var(--border-thickness) solid var(--black);
            border-bottom: none;
        }

        .tab {
            padding: 12px 20px;
            background: var(--white);
            color: var(--black);
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-right: var(--border-thickness) solid var(--black);
            border-bottom: var(--border-thickness) solid var(--black);
            transition: none;
            flex: 1;
            min-width: 140px;
            text-align: center;
        }

        .copy-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            cursor: copy;
            padding: 5px;
            z-index: 10;
        }

        .theme-toggle {
            background: var(--black);
            color: var(--white);
            border: var(--border-thickness) solid var(--black);
            padding: 10px 20px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 2px;
        }

        .theme-toggle:hover {
            background: var(--white);
            color: var(--black);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--black);
            color: var(--white);
            padding: 10px 20px;
            font-weight: 700;
            z-index: 1000;
            display: none;
        }

        .tab:last-child {
            border-right: none;
        }

        .tab:hover,
        .tab.active {
            background: var(--black);
            color: var(--white);
        }

        .section-hidden {
            display: none;
        }

        .section-visible {
            display: block;
        }

        .controls-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
        }

        .search-container {
            flex: 1;
            position: relative;
            min-width: 280px;
        }

        .search-input {
            width: 100%;
            background: var(--white);
            color: var(--black);
            border: var(--border-thickness) solid var(--black);
            padding: 12px 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            outline: none;
        }

        .search-input::placeholder {
            color: #999;
            opacity: 0.5;
        }

        .global-btn {
            background: var(--black);
            color: var(--white);
            border: var(--border-thickness) solid var(--black);
            padding: 12px 24px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .global-btn:hover {
            background: var(--white);
            color: var(--black);
        }

        .precision-select {
            background: var(--white);
            color: var(--black);
            border: var(--border-thickness) solid var(--black);
            padding: 12px 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            outline: none;
            cursor: pointer;
            appearance: none;
            border-radius: 0;
            text-align: center;
        }

        .unit-box.search-dim {
            opacity: 0.2;
            filter: grayscale(1);
        }

        .unit-box.search-highlight {
            border-color: #ff3e00;
            /* A brutal accent color */
            background: rgba(255, 62, 0, 0.05);
        }

        [data-theme="dark"] .unit-box.search-highlight {
            background: rgba(255, 62, 0, 0.1);
        }

        /* Animations */
        .converter-section {
            transition: opacity 0.2s ease-in-out;
        }

        .tab-item {
            display: inline-block;
        }

        .tab-item.hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div id="toast" class="toast">COPIED TO CLIPBOARD</div>
    <div class="max-w-7xl mx-auto">
        <div class="top-bar">
            <div>
                <h1 class="main-title">BRUTAL<br>CONVERTER</h1>
                <p class="subtitle">Ultimate Multi-Unit Conversion Grid</p>
            </div>
            <button id="themeToggle" class="theme-toggle">DARK MODE</button>
        </div>

        <div class="controls-bar">
            <div class="search-container">
                <input type="text" id="unitSearch" class="search-input"
                    placeholder="SEARCH UNITS (E.G. 'MILE', 'KB')..." autocomplete="off">
            </div>
            <select id="precisionSelect" class="precision-select" title="DECIMAL PLACES">
                <option value="2">2 DEC</option>
                <option value="4">4 DEC</option>
                <option value="6" selected>6 DEC</option>
                <option value="8">8 DEC</option>
                <option value="10">10 DEC</option>
            </select>
            <button id="clearBtn" class="global-btn">CLEAR ALL</button>
        </div>

        <div class="tab-container" id="tabContainer">
            <!-- Tabs auto-generated -->
        </div>

        <div id="sections-container">
            <!-- Sections will be auto-generated to save space -->
        </div>
    </div>

    <script>
        const unitData = {
            currency: {
                label: 'CURRENCY',
                units: [
                    { name: 'USD', factor: 1 },
                    { name: 'INR', factor: 83 }, // Fallback
                    { name: 'EUR', factor: 0.92 },
                    { name: 'GBP', factor: 0.79 },
                    { name: 'JPY', factor: 150 },
                    { name: 'AED', factor: 3.67 },
                    { name: 'CAD', factor: 1.35 },
                    { name: 'AUD', factor: 1.52 }
                ]
            },
            length: {
                label: 'LENGTH',
                units: [
                    { name: 'Meter', factor: 1 },
                    { name: 'Kilometer', factor: 0.001 },
                    { name: 'Centimeter', factor: 100 },
                    { name: 'Millimeter', factor: 1000 },
                    { name: 'Mile', factor: 0.000621371 },
                    { name: 'Yard', factor: 1.09361 },
                    { name: 'Foot', factor: 3.28084 },
                    { name: 'Inch', factor: 39.3701 },
                    { name: 'Gaj (India)', factor: 1.09361 }, // 1 Yard
                    { name: 'Hath (India)', factor: 2.18722 }, // 0.5 Yard approx
                    { name: 'Nautical Mile', factor: 0.000539957 }
                ]
            },
            area: {
                label: 'AREA',
                units: [
                    { name: 'Square Meter', factor: 1 },
                    { name: 'Square Foot', factor: 10.7639 },
                    { name: 'Bigha (Standard)', factor: 0.000395368 }, // 1 Bigha = 2529.28 sq m
                    { name: 'Gaj (Sq Yard)', factor: 1.19599 },
                    { name: 'Biswa', factor: 0.00790737 }, // 1/20 Bigha
                    { name: 'Kanal', factor: 0.00197684 }, // 1/8 Acre approx
                    { name: 'Marla', factor: 0.0395368 }, // 1/20 Kanal approx
                    { name: 'Guntha', factor: 0.00988422 }, // 101.17 sq m
                    { name: 'Ground', factor: 0.004484 }, // 222.96 sq m
                    { name: 'Cent', factor: 0.0247105 }, // 40.47 sq m
                    { name: 'Acre', factor: 0.000247105 },
                    { name: 'Hectare', factor: 0.0001 },
                    { name: 'Square Kilometer', factor: 0.000001 }
                ]
            },
            mass: {
                label: 'MASS',
                units: [
                    { name: 'Kilogram', factor: 1 },
                    { name: 'Gram', factor: 1000 },
                    { name: 'Tola (India)', factor: 85.735 }, // 11.66g
                    { name: 'Maund (India)', factor: 0.026792 }, // 37.32kg
                    { name: 'Pound', factor: 2.20462 },
                    { name: 'Ounce', factor: 35.274 },
                    { name: 'Metric Ton', factor: 0.001 },
                    { name: 'Carat', factor: 5000 }
                ]
            },
            temperature: {
                label: 'TEMPERATURE',
                units: [
                    { name: 'Celsius', toBase: v => v + 273.15, fromBase: v => v - 273.15 },
                    { name: 'Fahrenheit', toBase: v => (v - 32) * 5 / 9 + 273.15, fromBase: v => (v - 273.15) * 9 / 5 + 32 },
                    { name: 'Kelvin', toBase: v => v, fromBase: v => v },
                    { name: 'Rankine', toBase: v => v * 5 / 9, fromBase: v => v * 9 / 5 }
                ]
            },
            volume: {
                label: 'VOLUME',
                units: [
                    { name: 'Liter', factor: 1 },
                    { name: 'Milliliter', factor: 1000 },
                    { name: 'Cubic Meter', factor: 0.001 },
                    { name: 'Gallon (US)', factor: 0.264172 },
                    { name: 'Quart (US)', factor: 1.05669 },
                    { name: 'Pint (US)', factor: 2.11338 },
                    { name: 'Fluid Ounce', factor: 33.814 }
                ]
            },
            time: {
                label: 'TIME',
                units: [
                    { name: 'Second', factor: 1 },
                    { name: 'Minute', factor: 1 / 60 },
                    { name: 'Hour', factor: 1 / 3600 },
                    { name: 'Day', factor: 1 / 86400 },
                    { name: 'Week', factor: 1 / 604800 },
                    { name: 'Year', factor: 1 / 31556952 }
                ]
            },
            digital: {
                label: 'DIGITAL',
                units: [
                    { name: 'Byte', factor: 1 },
                    { name: 'Kilobyte', factor: 1 / 1024 },
                    { name: 'Megabyte', factor: 1 / 1048576 },
                    { name: 'Gigabyte', factor: 1 / 1073741824 },
                    { name: 'Bit', factor: 8 }
                ]
            },
            speed: {
                label: 'SPEED',
                units: [
                    { name: 'Meter/Second', factor: 1 },
                    { name: 'Kilometer/Hour', factor: 3.6 },
                    { name: 'Mile/Hour', factor: 2.23694 },
                    { name: 'Knot', factor: 1.94384 }
                ]
            },
            pressure: {
                label: 'PRESSURE',
                units: [
                    { name: 'Pascal', factor: 1 },
                    { name: 'Bar', factor: 0.00001 },
                    { name: 'PSI', factor: 0.000145038 },
                    { name: 'Atmosphere', factor: 9.86923e-6 }
                ]
            },
            energy: {
                label: 'ENERGY',
                units: [
                    { name: 'Joule', factor: 1 },
                    { name: 'Kilojoule', factor: 0.001 },
                    { name: 'Calorie', factor: 0.239006 },
                    { name: 'Watt Hour', factor: 0.000277778 }
                ]
            },
            power: {
                label: 'POWER',
                units: [
                    { name: 'Watt', factor: 1 },
                    { name: 'Kilowatt', factor: 0.001 },
                    { name: 'Horsepower', factor: 0.00134102 }
                ]
            },
            frequency: {
                label: 'FREQUENCY',
                units: [
                    { name: 'Hertz', factor: 1 },
                    { name: 'Kilohertz', factor: 0.001 },
                    { name: 'Megahertz', factor: 0.000001 }
                ]
            },
            angle: {
                label: 'ANGLE',
                units: [
                    { name: 'Degree', factor: 1 },
                    { name: 'Radian', factor: 0.0174533 }
                ]
            },
            dataRate: {
                label: 'DATA RATE',
                units: [
                    { name: 'Bit/s', factor: 1 },
                    { name: 'Megabit/s', factor: 1e-6 },
                    { name: 'Megabyte/s', factor: 1.25e-7 }
                ]
            },
            fuelEconomy: {
                label: 'FUEL ECONOMY',
                units: [
                    { name: 'MPG (US)', toBase: v => 235.215 / v, fromBase: v => 235.215 / v },
                    { name: 'L/100km', toBase: v => v, fromBase: v => v },
                    { name: 'km/L', toBase: v => 100 / v, fromBase: v => 100 / v }
                ]
            }
        };

        let currentPrecision = 6;

        const copyIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;

        async function setupUI() {
            const container = document.getElementById('sections-container');
            const tabContainer = document.getElementById('tabContainer');

            tabContainer.innerHTML = '';
            container.innerHTML = '';

            // Initialize Currency if available
            if (unitData.currency) {
                try {
                    const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                    const data = await res.json();
                    if (data && data.rates) {
                        unitData.currency.units.forEach(u => {
                            if (data.rates[u.name]) u.factor = data.rates[u.name];
                        });
                    }
                } catch (e) {
                    console.warn("Currency fetch failed, using fallbacks");
                }
            }

            Object.keys(unitData).forEach((key, idx) => {
                const section = unitData[key];

                // Create Tab
                const tab = document.createElement('button');
                tab.className = `tab ${idx === 0 ? 'active' : ''}`;
                tab.dataset.section = key;
                tab.textContent = section.label.charAt(0) + section.label.slice(1).toLowerCase();
                tabContainer.appendChild(tab);

                // Create Section
                const sectionEl = document.createElement('div');
                sectionEl.className = `converter-section ${idx === 0 ? 'section-visible' : 'section-hidden'}`;
                sectionEl.id = key;
                sectionEl.innerHTML = `
                    <div class="section-header">${section.label}</div>
                    <div class="converter-grid" id="${key}-grid"></div>
                `;
                container.appendChild(sectionEl);
                createUnitBoxes(key);
            });

            setupEventListeners();
        }

        function createUnitBoxes(section) {
            const grid = document.getElementById(`${section}-grid`);
            const units = unitData[section].units;
            unitData[section].inputs = []; // Initialize cache

            units.forEach((unit, index) => {
                const box = document.createElement('div');
                box.className = 'unit-box';
                box.innerHTML = `
                    <button class="copy-btn" title="Copy">${copyIcon}</button>
                    <label class="unit-label">${unit.name}</label>
                    <input type="number" class="unit-input" data-section="${section}" data-index="${index}" placeholder="0" step="any">
                `;
                const input = box.querySelector('input');
                unitData[section].inputs.push(input); // Cache input

                // Copy logic
                const copyBtn = box.querySelector('.copy-btn');
                copyBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (input.value) {
                        navigator.clipboard.writeText(input.value);
                        showToast();
                        const originalSVG = copyBtn.innerHTML;
                        copyBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00ff00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
                        setTimeout(() => { copyBtn.innerHTML = originalSVG; }, 1000);
                    }
                });

                input.addEventListener('click', (e) => e.stopPropagation());

                grid.appendChild(box);
            });

            unitData[section].inputs.forEach(input => {
                input.addEventListener('input', handleInputChange);
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        function handleInputChange(e) {
            const section = e.target.dataset.section;
            const index = parseInt(e.target.dataset.index);
            const valStr = e.target.value;
            const value = parseFloat(valStr);
            const inputs = unitData[section].inputs; // Use cached inputs

            if (isNaN(value) || valStr === '') {
                inputs.forEach(input => {
                    if (input !== e.target) input.value = '';
                });
                return;
            }

            const units = unitData[section].units;
            const sourceUnit = units[index];

            inputs.forEach((input, i) => {
                if (i !== index) {
                    const targetUnit = units[i];
                    let result;

                    // Generic conversion logic
                    if (sourceUnit.toBase || targetUnit.fromBase) {
                        // Handle potential division by zero for reciprocal units
                        if (sourceUnit.toBase && value === 0 && (sourceUnit.name.includes('MPG') || sourceUnit.name.includes('km/L'))) {
                            result = 0;
                        } else {
                            const base = sourceUnit.toBase ? sourceUnit.toBase(value) : value / sourceUnit.factor;
                            result = targetUnit.fromBase ? targetUnit.fromBase(base) : base * targetUnit.factor;
                        }
                    } else {
                        // Linear conversion optimized
                        const baseValue = value / sourceUnit.factor;
                        result = baseValue * targetUnit.factor;
                    }

                    input.value = formatNumber(result);
                }
            });
        }

        function formatNumber(num) {
            if (num === 0) return 0;
            const abs = Math.abs(num);
            if (abs < 0.000001 || abs > 1e12) return num.toExponential(4);
            return parseFloat(num.toFixed(currentPrecision));
        }

        function setupEventListeners() {
            // Tab switching
            document.getElementById('tabContainer').addEventListener('click', (e) => {
                if (e.target.classList.contains('tab')) {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');

                    document.querySelectorAll('.converter-section').forEach(s => {
                        s.classList.remove('section-visible');
                        s.classList.add('section-hidden');
                    });

                    const sectionId = e.target.dataset.section;
                    const section = document.getElementById(sectionId);
                    section.classList.remove('section-hidden');
                    section.classList.add('section-visible');
                }
            });

            // Theme toggle
            const themeBtn = document.getElementById('themeToggle');
            themeBtn.addEventListener('click', () => {
                const current = document.body.getAttribute('data-theme');
                const target = current === 'dark' ? 'light' : 'dark';
                document.body.setAttribute('data-theme', target);
                themeBtn.innerText = target === 'dark' ? 'LIGHT MODE' : 'DARK MODE';
            });

            // Precision selector
            document.getElementById('precisionSelect').addEventListener('change', (e) => {
                currentPrecision = parseInt(e.target.value);
                const activeInput = document.querySelector('input:focus') || document.querySelector('input[value]:not([value=""])');
                if (activeInput) handleInputChange({ target: activeInput });
            });

            // Clear button
            document.getElementById('clearBtn').addEventListener('click', () => {
                document.querySelectorAll('.unit-input').forEach(input => input.value = '');
            });

            // Search functionality
            document.getElementById('unitSearch').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                const tabs = document.querySelectorAll('.tab'), units = document.querySelectorAll('.unit-box');
                const visibleSections = new Set();

                units.forEach(u => {
                    const match = !query || u.querySelector('.unit-label').textContent.toLowerCase().includes(query);
                    u.classList.toggle('search-highlight', !!query && match);
                    u.classList.toggle('search-dim', !!query && !match);
                    if (match) visibleSections.add(u.querySelector('input').dataset.section);
                });

                tabs.forEach(t => {
                    const match = visibleSections.has(t.dataset.section) || t.textContent.toLowerCase().includes(query);
                    t.classList.toggle('hidden', !!query && !match);
                });
            });
        }

        setupUI();
    </script>
</body>

</html>
